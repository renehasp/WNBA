# WNBA SyncCourt v1.2.0 - Production Ready
# Live WNBA game tracker with team detail pages, player rosters, box scores, shot charts, and leaderboards
#
# Features:
# - Team detail popup menus with WNBA/ESPN/Wikipedia links
# - Fixed WNBA team page URLs with correct team IDs
# - SyncCourt logo and branding
# - Play-by-play filters by player and play type
# - Sticky mini scoreboard with dismiss option
# - Full team names and richer player cards
# - Box score totals, shot chart with scrubber, league leaderboards
# - Settings: font size scaling, time zone, favorite team personalization
# - Spoiler veil for broadcast delay management

services:
  # Development server with hot reload
  app-dev:
    image: node:24-alpine
    container_name: wnba-synccourt-dev
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
    command: sh -c "npm install && npm run dev"
    networks:
      - wnba-network

  # Production build and run
  app-prod:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wnba-synccourt-prod
    ports:
      - "1997:3000"
    environment:
      - NODE_ENV=production
    networks:
      - wnba-network
    profiles:
      - prod

networks:
  wnba-network:
    driver: bridge
